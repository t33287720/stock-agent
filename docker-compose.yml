services:

  # ── 前端 PHP + Nginx ───────────────────────────────────────────────────────────
  web:
    build: ./web
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

  # ── Python FastAPI 後端 ────────────────────────────────────────────────────────
  api:
    build: ./api
    environment:
      DB_HOST:     db
      DB_PORT:     "5432"
      DB_NAME:     ${DB_NAME:-stockdb}
      DB_USER:     ${DB_USER:-stockuser}
      DB_PASSWORD: ${DB_PASSWORD:-stock2025pw}
    volumes:
      - api_cache:/app/cache      # 股票快取（不進 image）
      - api_config:/app/config    # settings.json（含 API key）
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL（Python API 用）────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       ${DB_NAME:-stockdb}
      POSTGRES_USER:     ${DB_USER:-stockuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-stock2025pw}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-stockuser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── DB 管理介面（Adminer 管理 Postgres）───────────────────────────────────────
  adminer:
    image: adminer:latest
    ports:
      - "8082:8080"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  db_data:
    external: true
    name: stock_postgres_data
  api_cache:
  api_config:
