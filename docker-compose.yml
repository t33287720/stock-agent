services:

  # ── 前端 PHP + Nginx ───────────────────────────────────────────────────────────
  web:
    container_name: stock-web
    build: ./web
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

  # ── Python FastAPI 後端 ────────────────────────────────────────────────────────
  api:
    container_name: stock-api
    build: ./api
    environment:
      DB_HOST:     db
      DB_PORT:     "5432"
      DB_NAME:     ${DB_NAME:-stockdb}
      DB_USER:     ${DB_USER:-stockuser}
      DB_PASSWORD: ${DB_PASSWORD:?請在 .env 設定 DB_PASSWORD}
      SEARXNG_URL: http://searxng:8080
      OLLAMA_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./api/cache:/app/cache    # 股票快取（不進 image）
      - ./api/config:/app/config  # settings.json
    depends_on:
      db:
        condition: service_healthy
      searxng:
        condition: service_started
    restart: unless-stopped

  # ── SearXNG（個股新聞搜尋，免 API key，主要供 api 內部呼叫；對外開放方便手動驗證搜尋結果）──
  searxng:
    container_name: stock-searxng
    image: searxng/searxng:latest
    ports:
      - "8081:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    restart: unless-stopped

  # ── PostgreSQL（Python API 用）────────────────────────────────────────────────
  db:
    container_name: stock_db
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       ${DB_NAME:-stockdb}
      POSTGRES_USER:     ${DB_USER:-stockuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?請在 .env 設定 DB_PASSWORD}
    volumes:
      - ./db/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-stockuser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── DB 管理介面（Adminer 管理 Postgres）───────────────────────────────────────
  adminer:
    container_name: stock-adminer
    image: adminer:latest
    ports:
      - "8083:8080"
    depends_on:
      - db
    restart: unless-stopped
