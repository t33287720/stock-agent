server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React SPA — 所有路徑 fallback 到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Python FastAPI
    location /api/ {
        proxy_pass         http://api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # Node.js Agent
    location /agent/ {
        proxy_pass         http://agent:3000/agent/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location /ask {
        proxy_pass         http://agent:3000/ask;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }
}
