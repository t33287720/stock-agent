# 開發模式（docker-compose up 自動套用此檔）
# 生產部署請用：docker-compose -f docker-compose.yml up -d

services:
  web:
    volumes:
      - ./front:/opt/stock          # 即時同步 PHP 原始碼
  api:
    volumes:
      - ./back:/opt/stock           # 即時同步 Python 原始碼
    command: uvicorn backend.main:app --reload --host 0.0.0.0 --port 8000
